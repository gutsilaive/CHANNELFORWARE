services:
  - type: web
    name: autoforward-bot
    pythonVersion: "3.11.0"
    runtime: python
    plan: free
    numInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # PORT is injected automatically by Render — do NOT override it here
